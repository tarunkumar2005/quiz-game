<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <div class="screen active" id="start-screen">
      <h1>Quiz Time!</h1>
      <p>Test your knowledge with these fun questions.</p>
      <button id="start-btn">Start Quiz</button>
    </div>


    <div class="screen" id="quiz-screen">
      <div class="quiz-header">
        <h2 id="question-text">Question</h2>
        <div class="quiz-info">
          <p>
            Question <span id="current-question">1</span> of <span id="total-question">5</span>
          </p>
          <p>
            Score: <span id="score">1</span>
          </p>
        </div>

        <div id="answers-container" class="answers-container">

        </div>
      </div>

      <div class="progress-bar">
        <div id="progress" class="progress"></div>
      </div>
    </div>

    <div class="screen" id="result-screen">
      <h1>Quiz Result</h1>
      <div class="result-info">
        <p>You scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>

        <div id="result-msg">Good Job!</div>
      </div>
      <button id="restart-btn">Restart Quiz</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
